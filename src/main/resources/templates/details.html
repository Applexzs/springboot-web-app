<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Document</title>
</head>
<body>
  <h1 th:text="${title}"></h1>
    <ul>
        <li th:text="${user.name}"></li>
        <li th:text="${user.lastname}"></li>
        <li th:if="${user.email}" th:text="${user.email}"></li>
        <li th:if="${not (user.email != null)}" th:text="${'No tiene email'}"></li>
    </ul>
  <a th:href="@{/list}">Ver listado</a>
  <br/><br/>
  <a th:href="@{'/api/params/foo?message=' + ${title}}">Ver Mensaje</a>
  <br/><br/>
  <a th:href="@{/api/params/bar(text='Hola que tal festival', code=5353)}">Ver 2x param Mensaje</a>
  <br/><br/>
  <a th:href="@{/api/var/baz/hola algun mensaje}">Ver path variable</a>
  <br/><br/>
  <a th:href="@{'/api/var/baz/' + 'hola algun mensaje 2'}">Ver path variable 2</a>


</body>
</html>
